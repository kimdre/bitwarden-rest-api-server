name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # https://github.com/bitwarden/clients/releases?q=CLI
  BW_CLI_VERSION: 2026.3.0

jobs:
  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image
        run: |
          docker build \
            --build-arg BW_CLI_VERSION=${BW_CLI_VERSION} \
            -t bitwarden-rest-api-smoke:${{ github.sha }} \
            .

      - name: Smoke test bw --version
        run: |
          version="$(docker run --rm --entrypoint /usr/local/bin/bw bitwarden-rest-api-smoke:${{ github.sha }} --version)"
          echo "Detected bw version: ${version}"
          echo "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'

  build:
    name: Build image
    needs: docker-smoke
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          labels: |
            bitwarden-cli.version=${{ env.BW_CLI_VERSION }}
          tags: |
            type=raw,value=${{ env.BW_CLI_VERSION }}
            type=raw,value=latest

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            BW_CLI_VERSION=${{ env.BW_CLI_VERSION  }}
          cache-from: type=gha
          cache-to: type=gha,mode=max