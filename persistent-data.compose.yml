services:
  bitwarden-api:
    volumes:
      - data:/data
    tmpfs: !reset []
    depends_on:
      set_permissions:
        condition: "service_completed_successfully"

  set_permissions:
    image: busybox:latest
    command: sh -c "chown -R 65532:65532 /data"
    volumes:
      - data:/data
    restart: "no"

volumes:
  data: